services:
  app:
    build: .
    container_name: lab8-app
    ports:
      - "3000:3000"
    environment:
      MODE: docker
      MONGO_URL: mongodb://mongo:27017/lab8db
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    container_name: mongo
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d

volumes:
  mongo_data:

